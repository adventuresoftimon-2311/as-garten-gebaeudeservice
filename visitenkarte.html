<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Visitenkarte AS Garten- & Gebäudeservice</title>
  <!-- Load font families same as website -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* Reset and Page Setup */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    @page {
      size: 89mm 59mm; /* 85mm x 55mm + 2mm bleed on each side */
      margin: 0;
    }
    
    body {
      background-color: #ffffff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    
    /* Card Container */
    .card {
      width: 89mm;
      height: 59mm;
      position: relative;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      page-break-after: always;
      /* Safety margin: 6mm from the bleed edge ensures elements are safe from trimming */
      padding: 8mm 8mm;
    }
    
    /* Front Side: Centered Logo */
    .card-front {
      justify-content: center;
      align-items: center;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 48px;
      height: 48px;
      background-color: #0F3223;
      color: #D4AF37;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.65rem;
      border: 1.5px solid #D4AF37;
      font-family: 'Outfit', sans-serif;
    }
    
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.05;
      font-family: 'Outfit', sans-serif;
      text-align: left;
    }
    
    .logo-text span:first-child {
      font-size: 1.75rem;
      font-weight: 800;
      color: #0F3223;
    }
    
    .logo-subtitle {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #2D6A4F;
      margin-top: 3px;
    }
    
    /* Back Side: Left-aligned and structured */
    .card-back {
      justify-content: center;
      align-items: flex-start;
      padding-left: 10mm; /* Extra left padding to offset bleed and look perfectly balanced */
    }
    
    .logo-small {
      margin-bottom: 5mm;
    }
    
    .logo-small .logo-icon {
      width: 32px;
      height: 32px;
      font-size: 1.1rem;
      border-radius: 5px;
      border: 1px solid #D4AF37;
    }
    
    .logo-small .logo-text span:first-child {
      font-size: 1.25rem;
    }
    
    .logo-small .logo-subtitle {
      font-size: 0.55rem;
      margin-top: 2px;
    }
    
    .contact-details {
      display: flex;
      flex-direction: column;
      gap: 3mm;
    }
    
    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      color: #2A302C;
      text-decoration: none;
    }
    
    .icon-wrapper {
      width: 18px; /* Fixed width to make values perfectly flush */
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .contact-item svg {
      color: #0F3223;
      flex-shrink: 0;
    }
    
    .contact-value {
      font-weight: 500;
      color: #0F3223;
    }
  </style>
</head>
<body>

  <!-- PAGE 1: FRONT -->
  <div class="card card-front">
    <div class="logo">
      <div class="logo-icon">AS</div>
      <div class="logo-text">
        <span>AS Garten- &</span>
        <span class="logo-subtitle">Gebäudeservice</span>
      </div>
    </div>
  </div>

  <!-- PAGE 2: BACK -->
  <div class="card card-back">
    <div class="logo logo-small">
      <div class="logo-icon">AS</div>
      <div class="logo-text">
        <span>AS Garten- &</span>
        <span class="logo-subtitle">Gebäudeservice</span>
      </div>
    </div>
    
    <div class="contact-details">
      <!-- Phone -->
      <div class="contact-item">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        </div>
        <span class="contact-value">0176 40174981</span>
      </div>
      
      <!-- Email -->
      <div class="contact-item">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </div>
        <span class="contact-value">asservice19888@gmail.com</span>
      </div>
      
      <!-- Web -->
      <div class="contact-item">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        </div>
        <span class="contact-value">www.as-garten-gebäudeservice.de</span>
      </div>
    </div>
  </div>

</body>
</html>
